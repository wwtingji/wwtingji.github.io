<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>茅屋秋风·为寒士建广厦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "KaiTi", "楷体", "STKaiti", "Georgia", "Times New Roman", serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a3c2c 0%, #2d6a4f 50%, #1b4d3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }
        
        body::before {
            content: "🎋 🎋 🎋";
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 50px;
            opacity: 0.08;
            white-space: pre;
            pointer-events: none;
        }
        
        body::after {
            content: "🍃 🍃 🍃";
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 42px;
            opacity: 0.08;
            pointer-events: none;
        }
        
        /* 卡片容器统一宽度+固定内边距，确保所有场景高度一致 */
        .game-card {
            max-width: 480px;
            width: 100%;
            min-height: 620px;
            background: linear-gradient(165deg, #fef7e8 0%, #f9efdb 100%);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 4px #e8c89a, 0 0 0 8px #d4a56e;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        
        .game-card::before {
            content: "";
            position: absolute;
            top: -2px;
            left: 0;
            right: 0;
            height: 14px;
            background: linear-gradient(90deg, #b87c4b, #e8c49a, #c9925e, #e8c49a, #b87c4b);
            border-radius: 20px 20px 0 0;
            z-index: 2;
        }
        
        /* 保证内部内容区域滚动自适应，但高度固定由min-height控制，内容足够时撑开 */
        .card-inner {
            padding: 20px 18px 26px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* 公共区块样式保证所有界面高度协调 */
        .welcome-section {
            text-align: center;
            margin-bottom: 16px;
            position: relative;
        }
        
        .title-icon {
            font-size: 52px;
            margin-bottom: 6px;
            filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.12));
            animation: gentleFloat 3s ease-in-out infinite;
        }
        
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        
        .main-title {
            font-size: 38px;
            font-weight: bold;
            color: #2d6a4f;
            text-shadow: 2px 2px 0 #e8d5b5;
            letter-spacing: 4px;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        
        .sub-title {
            font-size: 14px;
            color: #a0672f;
            background: linear-gradient(135deg, #f3e5c0, #eeddae);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 40px;
            border: 1px solid #d4a56e;
            margin: 10px 0 4px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        /* 对话框区域：固定长度，头像已包含图片 */
        .intro-box {
            background: linear-gradient(145deg, #e8d5b5, #dfc79e);
            border-radius: 28px 28px 28px 14px;
            padding: 18px 16px;
            margin: 10px 0 18px;
            border: 1px solid #c99a62;
            box-shadow: 5px 5px 0 rgba(100, 60, 20, 0.15), inset 0 1px 2px rgba(255,255,220,0.8);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .teacher-avatar {
            flex-shrink: 0;
            position: relative;
            width: 72px;
            height: 72px;
        }
        
        /* 真实头像图片 */
        .teacher-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4a56e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            background: #fef0cf;
            display: block;
        }
        
        .teacher-avatar::after {
            content: "🎓";
            position: absolute;
            bottom: -4px;
            right: -4px;
            font-size: 19px;
            background: #f5e6c0;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #c99a62;
            pointer-events: none;
        }
        
        .teacher-talk {
            flex: 1;
            background: #fffef7;
            padding: 14px 16px;
            border-radius: 22px 22px 22px 10px;
            border: 1px solid #d4a56e;
            font-size: 16px;
            color: #2c4b35;
            line-height: 1.55;
            box-shadow: inset 0 0 0 1px #fffbe6, 2px 2px 6px rgba(0,0,0,0.06);
            position: relative;
        }
        
        .teacher-talk::before {
            content: "“";
            position: absolute;
            left: 10px;
            top: -2px;
            font-size: 26px;
            color: #c99a62;
            font-family: "Georgia", serif;
            opacity: 0.4;
        }
        
        .teacher-talk strong {
            color: #c2612c;
            font-size: 17px;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .build-area {
            background: linear-gradient(145deg, #c9a87c, #bc9368);
            border-radius: 42px 42px 28px 28px;
            padding: 18px 16px 16px;
            margin: 12px 0 18px;
            border: 1px solid #e8c49a;
            box-shadow: inset 0 0 0 2px #efdbb6, 0 8px 0 #7a583a;
        }
        
        .house-canvas {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(145deg, #b8d9a6, #9bc47c);
            border-radius: 24px 24px 18px 18px;
            border: 3px solid #6e9f4e;
            box-shadow: inset 0 -3px 0 #4a7a2e, 0 6px 12px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .house-canvas img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.35s ease;
        }
        
        .quiz-section {
            background: linear-gradient(145deg, #fff5e6, #feefd6);
            border-radius: 38px;
            padding: 20px 18px;
            border: 1px solid #dbb87a;
            box-shadow: inset 0 1px 4px rgba(255,255,240,0.9), 0 6px 0 #a87d4a, 0 5px 12px rgba(0,0,0,0.12);
            margin: 15px 0 18px;
            position: relative;
        }
        
        .quiz-section::before {
            position: absolute;
            top: -11px;
            left: 18px;
            font-size: 20px;
            background: #f5e6ce;
            padding: 0 6px;
            border-radius: 30px;
            border: 1px solid #dbb87a;
        }
        
        .current-question {
            font-size: 18px;
            font-weight: bold;
            color: #2a5a3a;
            margin-bottom: 18px;
            padding-left: 10px;
            border-left: 5px solid #e09d4a;
            line-height: 1.4;
        }
        
        .option-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 0;
        }
        
        .option-item {
            background: linear-gradient(145deg, #ffffff, #fff9ef);
            border: 2px solid #d4a06a;
            border-radius: 50px;
            padding: 12px 18px;
            font-size: 16px;
            color: #2c4b35;
            box-shadow: 0 3px 0 #b07d48;
            cursor: pointer;
            transition: all 0.08s linear;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .option-item::before {
            content: "📜";
            font-size: 18px;
            opacity: 0.6;
        }
        
        .option-item:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b07d48;
        }
        
        .option-item.correct {
            background: linear-gradient(145deg, #c8e6c8, #b5d9a5);
            border-color: #3a8a3a;
            box-shadow: 0 3px 0 #2a6a2a;
        }
        
        .option-item.correct::before {
            content: "✅";
            opacity: 1;
        }
        
        .option-item.wrong {
            background: linear-gradient(145deg, #f5d0d0, #ecc5c5);
            border-color: #c96a5a;
            box-shadow: 0 3px 0 #a05242;
        }
        
        .option-item.wrong::before {
            content: "❌";
            opacity: 1;
        }
        
        .option-item.disabled {
            pointer-events: none;
            opacity: 0.75;
        }
        
        /* ========= 改进后的多行反馈卡片（手机友好） ========= */
        .feedback-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 85%;
            width: auto;
            min-width: 220px;
            background: linear-gradient(145deg, #2c3a1f, #1f2e12);
            color: #ffefb9;
            padding: 18px 22px;
            border-radius: 32px;
            font-size: 16px;
            font-weight: bold;
            z-index: 200;
            text-align: center;
            font-family: "KaiTi", "楷体", serif;
            box-shadow: 0 12px 28px rgba(0,0,0,0.45), 0 0 0 2px #ffdd88, 0 0 0 5px #6b4c2c;
            border: none;
            line-height: 1.5;
            white-space: normal;
            word-break: break-word;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }
        
        .feedback-card.show {
            opacity: 1;
        }
        
        /* 小屏幕上适当调整内边距和字号 */
        @media (max-width: 480px) {
            .feedback-card {
                padding: 16px 20px;
                font-size: 15px;
                max-width: 90%;
                border-radius: 28px;
            }
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .btn {
            flex: 1;
            background: linear-gradient(145deg, #dbb87a, #c99a62);
            border: none;
            border-bottom: 4px solid #8a623a;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 0;
            border-radius: 50px;
            color: #2c3a1f;
            cursor: pointer;
            transition: all 0.08s;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            letter-spacing: 2px;
        }
        
        .btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }
        
        .btn.secondary {
            background: linear-gradient(145deg, #bca87a, #a88d60);
            border-bottom-color: #6a5230;
        }
        
        .start-overlay {
            background: linear-gradient(165deg, #fff8ec, #feefd6);
            border-radius: 48px;
            padding: 28px 20px 26px;
            text-align: center;
            margin: 10px 0 18px;
            border: 2px solid #e8c49a;
            box-shadow: inset 0 0 16px #fff8e0, 0 10px 20px rgba(0,0,0,0.12);
        }
        
        .start-icon {
            font-size: 64px;
            margin-bottom: 10px;
            filter: drop-shadow(2px 5px 6px rgba(0,0,0,0.12));
        }
        
        .start-title {
            font-size: 32px;
            font-weight: bold;
            color: #2d6a4f;
            margin-bottom: 6px;
            text-shadow: 2px 2px 0 #e8d5b5;
        }
        
        .start-desc {
            font-size: 16px;
            color: #b56a2a;
            margin-bottom: 24px;
            font-style: italic;
        }
        
        .big-start-btn {
            background: linear-gradient(145deg, #f5c56e, #e8a84a);
            border: none;
            border-bottom: 6px solid #b56a2a;
            font-size: 30px;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 60px;
            color: #2a4a1a;
            cursor: pointer;
            box-shadow: 0 10px 0 #8a4a1a, 0 6px 15px rgba(0,0,0,0.18);
            transition: 0.05s;
            width: 100%;
            letter-spacing: 6px;
        }
        
        .big-start-btn:active {
            transform: translateY(6px);
            border-bottom-width: 3px;
            box-shadow: 0 4px 0 #8a4a1a;
        }
        
        .celebration-page {
            text-align: center;
            padding: 24px 18px;
            background: linear-gradient(145deg, #fffef5, #fff7e8);
            border-radius: 44px;
            margin-top: 12px;
            border: 2px solid #e8c49a;
            animation: fadeInUp 0.5s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
            flex: 0 0 auto;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .celebration-icon {
            font-size: 70px;
            margin-bottom: 10px;
        }
        
        .celebration-title {
            font-size: 28px;
            font-weight: bold;
            color: #c56a2a;
            margin-bottom: 10px;
        }
        
        .celebration-text {
            font-size: 15px;
            color: #2d6a4f;
            line-height: 1.7;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            background: linear-gradient(145deg, #dbb87a, #c99a62);
            border: none;
            border-bottom: 4px solid #8a623a;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 45px;
            color: #2c3a1f;
            cursor: pointer;
            margin-top: 6px;
        }
        
        .building-toast {
            position: fixed;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, #2c3a1f, #1a2a10);
            color: #ffdd88;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
            animation: toastFloat 1.5s ease forwards;
            white-space: nowrap;
            font-family: "KaiTi", "楷体", serif;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
            border: 1px solid #ffdd88;
        }
        
        @keyframes toastFloat {
            0% { opacity: 0; transform: translateX(-50%) translateY(25px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-35px); }
        }
        
        /* 保证主内容区域自动撑开，不压缩底部按钮 */
        .game-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
<div class="game-card" id="gameCard">
    <div class="card-inner">
        <!-- 开场界面 -->
        <div id="startScreen" class="game-content">
            <div class="welcome-section">
                <div class="main-title">一砖一瓦</div>
                <div class="main-title">建广厦</div>
                <div class="sub-title">承杜甫情怀 · 筑千万广厦</div>
            </div>
            
            <!-- 对话框区域：左侧头像引入真实图片 xiaoshen1.png -->
            <div class="intro-box">
                <div class="teacher-avatar">
                    <img src="xiao_shen1.png" alt="晓生老师" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2245%22%20fill%3D%22%23d4a56e%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22%23fff%22%20font-size%3D%2236%22%3E👨%3C%2Ftext%3E%3C%2Fsvg%3E'">
                </div>
                <div class="teacher-talk">
                    <strong>📖 晓生老师</strong>
                    杜甫说“安得广厦千万间，大庇天下寒士俱欢颜”。今天我们一起答题，帮助诗圣完成心愿，为天下寒士建造温暖的家！<br>
                    每答对一题，茅屋就会增添一部分新建筑，直到广厦落成。
                </div>
            </div>
            
            <div class="start-overlay">
                <div class="start-icon">🌾</div>
                <div class="start-title">茅屋为秋风所破</div>
                <div class="start-desc">但我们可以建起新的广厦</div>
                <button class="big-start-btn" id="startGameBtn">开始答题</button>
            </div>
        </div>

        <!-- 游戏主界面：固定布局，高度一致 -->
        <div id="gameScreen" style="display: none;" class="game-content">
            <div class="build-area">
                <div class="house-canvas">
                    <img id="houseImage" src="house.jpg" alt="建造进度" style="opacity: 1;">
                </div>
            </div>
            
            <div class="quiz-section">
                <div class="current-question" id="questionText">加载题目中...</div>
                <div class="option-list" id="optionsContainer"></div>
            </div>
            
            <div class="action-buttons">
                <button class="btn secondary" id="resetBtn">🔄 重新开始</button>
                <button class="btn" id="nextBtn">⏩ 下一题</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // 题库保持不变，但建造部分的描述保留原有部分名称
        const questions = [
            {
                question: "《茅屋为秋风所破歌》创作于杜甫在成都草堂时期，导致诗人生活困顿、居无定所的直接社会原因是？",
                options: ["A. 个人不善理财", "B. 安史之乱，时局动荡", "C. 蜀地常年台风灾害", "D. 朝廷刻意打压"],
                correct: 1,
                partName: "房屋框架",
                correct_feedback: "✅ 答对！\n安史之乱让大唐由盛转衰，也让杜甫颠沛流离！",
                wrong_feedback: "❌ 不对～\n杜甫的苦难根源是时代动荡！"
            },
            {
                question: "“南村群童欺我老无力，忍能对面为盗贼” 一句中，“盗贼” 一词理解最准确的是？",
                options: ["A. 杜甫真的认为孩童是盗贼，充满愤怒", "B. 无奈自嘲，折射战乱中民生凋敝", "C. 批评孩童道德败坏", "D. 指责乡邻管教不严"],
                correct: 1,
                partName: "坚实墙壁",
                correct_feedback: "✅ 精准！\n这是无奈自嘲，更是对乱世百姓疾苦的悲悯！",
                wrong_feedback: "❌ 答错～\n这是乱世里的心酸自嘲哦！"
            },
            {
                question: "杜甫由自身“茅屋破漏”推及“天下寒士”，这种情怀在诗中最集中体现的句子是？",
                options: ["A. 唇焦口燥呼不得，归来倚杖自叹息", "B. 布衾多年冷似铁，娇儿恶卧踏里裂", "C. 安得广厦千万间，大庇天下寒士俱欢颜", "D. 俄顷风定云墨色，秋天漠漠向昏黑"],
                correct: 2,
                partName: "温暖屋顶",
                correct_feedback: "✅ 完全正确！\n由己及人、心忧苍生，这正是诗圣最伟大的地方！",
                wrong_feedback: "❌ 不对～\n找诗中最能体现“为天下人发声”的呐喊句！"
            },
            {
                question: "杜甫诗被称为“诗史”，本诗不能体现“诗史”价值的一项是？",
                options: ["A. 记录安史之乱后民生疾苦", "B. 反映普通士人穷困处境", "C. 展现盛唐繁华气象", "D. 折射战乱年代物资匮乏"],
                correct: 2,
                partName: "炊烟烟囱",
                correct_feedback: "✅ 太棒了！\n本诗写的是乱世困苦，和盛唐繁华无关！",
                wrong_feedback: "❌ 答错～\n这首诗记录的是动荡与穷困！"
            },
            {
                question: "关于“吾庐独破受冻死亦足”一句，理解最恰当的是？",
                options: ["A. 诗人对生活绝望，消极避世", "B. 甘愿自我牺牲，换取天下寒士安居", "C. 无奈抱怨，发泄不满", "D. 故作豪言，并非真心"],
                correct: 1,
                partName: "绿树成荫",
                correct_feedback: "✅ 满分！\n舍己为人、心怀天下，广厦建成！",
                wrong_feedback: "❌ 不对～\n这是杜甫最赤诚的心愿！"
            }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        let currentQuestionAnswered = false;
        let allCompleted = false;
        let isAnimating = false;

        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const startBtn = document.getElementById('startGameBtn');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const resetBtn = document.getElementById('resetBtn');
        const nextBtn = document.getElementById('nextBtn');
        const houseImage = document.getElementById('houseImage');

        startBtn.addEventListener('click', function() {
            startScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            gameScreen.style.flexDirection = 'column';
            resetGame();
        });

        let activeFeedbackCard = null;
        
        // 改进后的多行反馈弹窗 (自动换行，自适应宽度)
        function showSmartFeedback(message, isError = false) {
            if (activeFeedbackCard) {
                activeFeedbackCard.classList.remove('show');
                setTimeout(() => {
                    if (activeFeedbackCard) activeFeedbackCard.remove();
                    activeFeedbackCard = null;
                    createAndShowFeedback(message, isError);
                }, 150);
            } else {
                createAndShowFeedback(message, isError);
            }
        }
        
        function createAndShowFeedback(message, isError) {
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback-card';
            // 保留换行符，转为html <br>
            const formattedMsg = message.replace(/\n/g, '<br>');
            feedbackDiv.innerHTML = formattedMsg;
            // 如果是对错反馈可以略微调整边框颜色，不强制
            document.body.appendChild(feedbackDiv);
            activeFeedbackCard = feedbackDiv;
            
            setTimeout(() => {
                feedbackDiv.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                if (feedbackDiv) {
                    feedbackDiv.classList.remove('show');
                    setTimeout(() => {
                        if (feedbackDiv && feedbackDiv.parentNode) feedbackDiv.remove();
                        if (activeFeedbackCard === feedbackDiv) activeFeedbackCard = null;
                    }, 300);
                }
            }, 2800);
        }

        function showBuildingAnimation(partName, callback) {
            if (isAnimating) return;
            isAnimating = true;
            
            const toast = document.createElement('div');
            toast.className = 'building-toast';
            toast.innerHTML = `🏗️ ${partName} 搭建中... 🏗️`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
                const completeToast = document.createElement('div');
                completeToast.className = 'building-toast';
                completeToast.innerHTML = `✨ ${partName} 落成！ ✨`;
                document.body.appendChild(completeToast);
                setTimeout(() => {
                    completeToast.remove();
                    isAnimating = false;
                    if (callback) callback();
                }, 1000);
            }, 800);
        }

        function updateImage() {
            if (houseImage) {
                houseImage.style.opacity = '0';
                setTimeout(() => {
                    if (correctCount === 0) {
                        houseImage.src = 'house.jpg';
                    } else {
                        houseImage.src = `house_${correctCount}.jpg`;
                    }
                    houseImage.style.opacity = '1';
                }, 200);
            }
        }

        function loadQuestion() {
            if (allCompleted) return;
            const q = questions[currentIndex];
            questionText.innerText = q.question;
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option-item';
                optDiv.innerText = opt;
                optDiv.addEventListener('click', (e) => handleOptionClick(e, q, idx));
                optionsContainer.appendChild(optDiv);
            });
            currentQuestionAnswered = false;
            document.querySelectorAll('.option-item').forEach(btn => {
                btn.classList.remove('disabled', 'correct', 'wrong');
                btn.style.pointerEvents = 'auto';
            });
            
            if (nextBtn) {
                nextBtn.classList.remove('disabled');
                nextBtn.innerText = '⏩ 下一题';
            }
        }

        function handleOptionClick(e, q, selectedIdx) {
            if (currentQuestionAnswered || allCompleted || isAnimating) return;
            const target = e.currentTarget;
            const isCorrect = (selectedIdx === q.correct);
            const allOpts = document.querySelectorAll('.option-item');
            
            if (isCorrect) {
                target.classList.add('correct');
                showSmartFeedback(q.correct_feedback);
                currentQuestionAnswered = true;
                allOpts.forEach(btn => btn.classList.add('disabled'));
                
                correctCount++;
                updateImage();
                
                showBuildingAnimation(q.partName, () => {
                    if (correctCount === 5) {
                        allCompleted = true;
                        showCelebration();
                    }
                });
            } else {
                target.classList.add('wrong');
                showSmartFeedback(q.wrong_feedback);
                target.classList.add('disabled');
                target.style.pointerEvents = 'none';
            }
        }

        function goToNextQuestion() {
            if (allCompleted) return;
            
            if (!currentQuestionAnswered) {
                showSmartFeedback('⚠️ 请先答对当前题目！');
                return;
            }
            
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                currentQuestionAnswered = false;
                loadQuestion();
            } else if (currentIndex === questions.length - 1 && correctCount === 5) {
                showSmartFeedback('🎉 恭喜！广厦已建成！');
            } else {
                showSmartFeedback('📚 这是最后一题，答对即可建成广厦！');
            }
        }

        function showCelebration() {
            const gameContainer = document.getElementById('gameScreen');
            const quizSection = document.querySelector('#gameScreen .quiz-section');
            const actionBtns = document.querySelector('#gameScreen .action-buttons');
            
            const celebrationDiv = document.createElement('div');
            celebrationDiv.className = 'celebration-page';
            celebrationDiv.innerHTML = `
                <div class="celebration-icon">🏆🎉🏡</div>
                <div class="celebration-title">恭喜你！广厦落成！</div>
                <div class="celebration-text">
                    你不仅吃透了《茅屋为秋风所破歌》的内容与情感，<br>
                    更读懂了杜甫由己及人、忧国忧民的诗圣情怀！
                </div>
                <button class="restart-btn" id="celebrationRestartBtn">🏗️ 再玩一局 🏗️</button>
            `;
            
            if (quizSection) quizSection.style.display = 'none';
            if (actionBtns) actionBtns.style.display = 'none';
            gameContainer.appendChild(celebrationDiv);
            
            document.getElementById('celebrationRestartBtn').addEventListener('click', function() {
                celebrationDiv.remove();
                if (quizSection) quizSection.style.display = 'block';
                if (actionBtns) actionBtns.style.display = 'flex';
                resetGame();
            });
        }

        function resetGame() {
            // 清除庆祝界面残留
            const celebrationDiv = document.querySelector('.celebration-page');
            if (celebrationDiv) celebrationDiv.remove();
            
            currentIndex = 0;
            correctCount = 0;
            currentQuestionAnswered = false;
            allCompleted = false;
            isAnimating = false;
            
            const quizSection = document.querySelector('#gameScreen .quiz-section');
            const actionBtns = document.querySelector('#gameScreen .action-buttons');
            if (quizSection) quizSection.style.display = 'block';
            if (actionBtns) actionBtns.style.display = 'flex';
            
            updateImage();
            loadQuestion();
            
            if (activeFeedbackCard) {
                activeFeedbackCard.remove();
                activeFeedbackCard = null;
            }
        }

        resetBtn.addEventListener('click', resetGame);
        nextBtn.addEventListener('click', goToNextQuestion);
        
        // 初始图片占位处理
        if (houseImage) houseImage.src = 'house.jpg';
    })();
</script>
</body>
</html>
