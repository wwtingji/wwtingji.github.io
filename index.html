<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>茅屋秋风·为寒士建广厦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "KaiTi", "楷体", "STKaiti", "Microsoft YaHei", serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e4b3c, #2f6b54);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        
        /* 主卡片 */
        .game-card {
            max-width: 400px;
            width: 100%;
            background: #fdf3e0;
            background-image: radial-gradient(circle at 10% 20%, #fff6e6 5%, transparent 30%);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4), 0 0 0 3px #c9a87c, 0 0 0 6px #efd6b0;
            padding: 24px 20px 30px;
            position: relative;
            overflow: hidden;
        }
        
        /* 装饰飘带 */
        .game-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(90deg, #c49a6c, #e5c8a3, #c49a6c);
            box-shadow: 0 2px 6px rgba(110, 70, 30, 0.3);
        }
        
        /* 开场区域 */
        .welcome-section {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .title-icon {
            font-size: 48px;
            margin-bottom: 4px;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
        }
        
        .main-title {
            font-size: 42px;
            font-weight: bold;
            color: #2a5e3a;
            text-shadow: 2px 2px 0 #e9d19b;
            letter-spacing: 3px;
            line-height: 1.2;
        }
        
        .sub-title {
            font-size: 16px;
            color: #7b542e;
            background: #eddbba;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            border: 2px solid #b48242;
            margin: 10px 0 5px;
            font-weight: bold;
        }
        
        /* 晓生老师介绍区 */
        .intro-box {
            background: #e6d7b8;
            border-radius: 30px 30px 30px 8px;
            padding: 16px 14px;
            margin: 5px 0 20px;
            border: 3px solid #b87c4b;
            box-shadow: 5px 5px 0 #7b5c3c;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .teacher-talk {
            flex: 1;
            background: #fff9e6;
            padding: 12px 12px;
            border-radius: 24px 24px 24px 8px;
            border: 2px solid #a57649;
            font-size: 16px;
            color: #2e4a33;
            line-height: 1.5;
            box-shadow: inset 0 0 0 2px #ffeac2;
        }
        
        .teacher-talk strong {
            color: #b34141;
            font-size: 18px;
        }
        
        /* 建房子区域 */
        .build-area {
            background: #cfb38c;
            border-radius: 40px 40px 24px 24px;
            padding: 20px 20px 20px;
            margin: 15px 0 18px;
            border: 4px solid #9b7b54;
            box-shadow: inset 0 0 0 3px #efdbb6, 0 8px 0 #6d4f32;
            position: relative;
        }
        
        /* 画布 - 房子绘制区 */
        .house-canvas {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #b1cfaa;
            background: linear-gradient(145deg, #c3e0b5, #8fb573);
            border-radius: 30px 30px 20px 20px;
            border: 4px solid #638753;
            box-shadow: inset 0 -6px 0 #507341, 0 6px 10px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .house-canvas img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }
        
        /* 进度条 - 温暖的表述 */
        .build-progress {
            margin-top: 20px;
            background: #f7e6c5;
            border-radius: 40px;
            padding: 12px 16px;
            border: 3px solid #b48242;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .progress-emoji {
            font-size: 28px;
            background: #efdbb6;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #9e7a50;
        }
        
        .progress-text {
            flex: 1;
            font-size: 18px;
            font-weight: bold;
            color: #2f4d2f;
        }
        
        .progress-bar-bg {
            width: 100%;
            height: 16px;
            background: #bc9f73;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid #7b623a;
            margin-top: 6px;
        }
        
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f7b32b, #ffd966, #f7b32b);
            border-radius: 30px;
            transition: width 0.5s;
        }
        
        /* 答题区 */
        .quiz-section {
            background: #f9edd0;
            border-radius: 40px;
            padding: 22px 18px;
            border: 4px solid #b48242;
            box-shadow: inset 0 1px 6px #fff1c1, 0 8px 0 #7b5c3c;
            margin: 18px 0 20px;
        }
        
        .current-question {
            font-size: 20px;
            font-weight: bold;
            color: #1f4a2f;
            margin-bottom: 15px;
            padding-left: 8px;
            border-left: 8px solid #c49a6c;
        }
        
        .option-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .option-item {
            background: #fff5e2;
            border: 3px solid #ad7a55;
            border-radius: 40px;
            padding: 15px 18px;
            font-size: 18px;
            color: #2d422d;
            box-shadow: 0 5px 0 #7b5c3c;
            cursor: pointer;
            transition: 0.05s linear;
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        
        .option-item:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        
        .option-item.correct {
            background: #c9e0b9;
            border-color: #2b873b;
            box-shadow: 0 5px 0 #1d6328;
        }
        
        .option-item.wrong {
            background: #f2c7c7;
            border-color: #b34141;
            box-shadow: 0 5px 0 #782a2a;
        }
        
        .option-item.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .feedback-message {
            background: #e6d7b8;
            border-radius: 30px;
            padding: 14px 18px;
            font-size: 17px;
            color: #234d2e;
            border: 2px solid #a57649;
            min-height: 60px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .feedback-icon {
            font-size: 26px;
        }
        
        /* 按钮组 */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        
        .btn {
            flex: 1;
            background: #ca9f6e;
            border: none;
            border-bottom: 6px solid #7b542e;
            font-size: 20px;
            font-weight: bold;
            padding: 14px 0;
            border-radius: 60px;
            color: #1f3f1f;
            cursor: pointer;
            transition: 0.06s;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        
        .btn:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
        }
        
        .btn.secondary {
            background: #b5a077;
            border-bottom-color: #615438;
        }
        
        .btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .footer-note {
            text-align: center;
            color: #6b4f2e;
            margin-top: 16px;
            font-size: 14px;
        }
        
        /* 开场启动按钮 */
        .start-overlay {
            background: rgba(253, 243, 224, 0.95);
            border-radius: 60px;
            padding: 35px 20px 30px;
            text-align: center;
            margin: 10px 0 20px;
            border: 5px solid #c49a6c;
            box-shadow: inset 0 0 20px #ffefcf;
        }
        
        .start-icon {
            font-size: 70px;
            margin-bottom: 10px;
            filter: drop-shadow(2px 6px 6px #7b623a);
        }
        
        .start-title {
            font-size: 38px;
            font-weight: bold;
            color: #1f572f;
            margin-bottom: 8px;
        }
        
        .start-desc {
            font-size: 20px;
            color: #9b4e1f;
            margin-bottom: 30px;
        }
        
        .big-start-btn {
            background: #f5b84b;
            border: none;
            border-bottom: 8px solid #a5671a;
            font-size: 36px;
            font-weight: bold;
            padding: 20px 30px;
            border-radius: 80px;
            color: #2a4a1a;
            cursor: pointer;
            box-shadow: 0 12px 0 #744d1c, 0 10px 20px black;
            transition: 0.05s;
            width: 100%;
            letter-spacing: 6px;
        }
        
        .big-start-btn:active {
            transform: translateY(8px);
            border-bottom-width: 4px;
            box-shadow: 0 4px 0 #744d1c;
        }
        
        /* 通关庆祝页面 */
        .celebration-page {
            text-align: center;
            padding: 20px 10px;
            background: #fff9e6;
            border-radius: 48px;
            margin-top: 15px;
            border: 4px solid #c49a6c;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .celebration-icon {
            font-size: 80px;
            margin-bottom: 10px;
        }
        
        .celebration-title {
            font-size: 32px;
            font-weight: bold;
            color: #c16829;
            margin-bottom: 12px;
        }
        
        .celebration-text {
            font-size: 18px;
            color: #2a5e3a;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            background: #ca9f6e;
            border: none;
            border-bottom: 6px solid #7b542e;
            font-size: 20px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 40px;
            color: #1f3f1f;
            cursor: pointer;
            margin-top: 10px;
        }
        
        /* 建造动画提示 */
        .building-toast {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #ffd966;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            z-index: 100;
            animation: toastFade 1.5s ease forwards;
            white-space: nowrap;
            font-family: "KaiTi", "楷体", serif;
        }
        
        @keyframes toastFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
        }
    </style>
</head>
<body>
<div class="game-card" id="gameCard">
    <!-- 开场界面 (默认显示) -->
    <div id="startScreen">
        <div class="welcome-section">
            <div class="title-icon">🏚️ ➡️ 🏡</div>
            <div class="main-title">为寒士建广厦</div>
            <div class="sub-title">承杜甫情怀，筑千万广厦</div>
        </div>
        
        <div class="intro-box">
            <img src="xiao_shen1.png" alt="晓生老师" 
                 style="width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid #a57649; box-shadow: 3px 3px 0 #614a2c; background: #f9e4b7;">
            <div class="teacher-talk">
                <strong>晓生老师：</strong>同学们好！杜甫说“安得广厦千万间，大庇天下寒士俱欢颜”，今天我们一起答题，帮助杜甫完成心愿，为天下寒士建造温暖的家。答对一题，添砖加瓦；全部答对，建成广厦！
            </div>
        </div>
        
        <div class="start-overlay">
            <div class="start-icon">🌾</div>
            <div class="start-title">茅屋为秋风所破</div>
            <div class="start-desc">但我们可以建起新的广厦</div>
            <button class="big-start-btn" id="startGameBtn">开始答题</button>
        </div>
    </div>

    <!-- 游戏主界面 (初始隐藏) -->
    <div id="gameScreen" style="display: none;">
        <div class="welcome-section">
            <div class="title-icon">🏗️</div>
            <div class="main-title">一砖一瓦·建广厦</div>
        </div>
        
        <!-- 房子建造区 -->
        <div class="build-area">
            <div class="house-canvas">
                <img id="houseImage" src="house_0.png" alt="建造进度" style="opacity: 1;">
            </div>
            
            <div class="build-progress">
                <div class="progress-emoji" id="progressEmoji">🪵</div>
                <div class="progress-text" id="progressText">建造进度: 0/5</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>
        </div>
        
        <!-- 答题区 -->
        <div class="quiz-section">
            <div class="current-question" id="questionText">加载题目中...</div>
            <div class="option-list" id="optionsContainer"></div>
            <div class="feedback-message" id="feedbackMessage">
                <span class="feedback-icon" id="feedbackIcon">📖</span>
                <span id="feedbackText">点击选项，为寒士添砖加瓦</span>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn secondary" id="resetBtn">🔄 重新开始</button>
            <button class="btn" id="nextBtn">⏩ 下一题</button>
        </div>
        
        <div class="footer-note">答对一题，添砖加瓦；全部答对，建成广厦！</div>
    </div>
</div>

<script>
    (function() {
        // ==================== 题库（5道题目 + 专属反馈） ====================
        const questions = [
            {
                question: "《茅屋为秋风所破歌》创作于杜甫在成都草堂时期，导致诗人生活困顿、居无定所的直接社会原因是？",
                options: ["A. 个人不善理财", "B. 安史之乱，时局动荡", "C. 蜀地常年台风灾害", "D. 朝廷刻意打压"],
                correct: 1,
                partName: "房屋框架",
                correct_feedback: "✅ 答对！安史之乱让大唐由盛转衰，也让杜甫颠沛流离，为广厦添一瓦！",
                wrong_feedback: "❌ 不对～微课提到：杜甫的苦难根源是时代动荡，再回看“知人论世”部分！"
            },
            {
                question: "“南村群童欺我老无力，忍能对面为盗贼” 一句中，“盗贼” 一词理解最准确的是？",
                options: ["A. 杜甫真的认为孩童是盗贼，充满愤怒", "B. 无奈自嘲，折射战乱中民生凋敝", "C. 批评孩童道德败坏", "D. 指责乡邻管教不严"],
                correct: 1,
                partName: "坚实墙壁",
                correct_feedback: "✅ 精准！这是无奈自嘲，更是对乱世百姓疾苦的悲悯，筑瓦成功！",
                wrong_feedback: "❌ 答错啦～微课特别讲过：这不是真指责，而是乱世里的心酸自嘲哦！"
            },
            {
                question: "杜甫由自身“茅屋破漏”推及“天下寒士”，这种情怀在诗中最集中体现的句子是？",
                options: ["A. 唇焦口燥呼不得，归来倚杖自叹息", "B. 布衾多年冷似铁，娇儿恶卧踏里裂", "C. 安得广厦千万间，大庇天下寒士俱欢颜", "D. 俄顷风定云墨色，秋天漠漠向昏黑"],
                correct: 2,
                partName: "温暖屋顶",
                correct_feedback: "✅ 完全正确！由己及人、心忧苍生，这正是诗圣最伟大的地方！",
                wrong_feedback: "❌ 不对～再找诗中最能体现“为天下人发声”的呐喊句！"
            },
            {
                question: "杜甫诗被称为“诗史”，本诗不能体现“诗史”价值的一项是？",
                options: ["A. 记录安史之乱后民生疾苦", "B. 反映普通士人穷困处境", "C. 展现盛唐繁华气象", "D. 折射战乱年代物资匮乏"],
                correct: 2,
                partName: "炊烟烟囱",
                correct_feedback: "✅ 太棒了！本诗写的是乱世困苦，和盛唐繁华无关，筑屋更进一步！",
                wrong_feedback: "❌ 答错～微课明确说：这首诗记录的是动荡与穷困，再仔细看选项！"
            },
            {
                question: "关于“吾庐独破受冻死亦足”一句，理解最恰当的是？",
                options: ["A. 诗人对生活绝望，消极避世", "B. 甘愿自我牺牲，换取天下寒士安居", "C. 无奈抱怨，发泄不满", "D. 故作豪言，并非真心"],
                correct: 1,
                partName: "绿树成荫",
                correct_feedback: "✅ 满分！舍己为人、心怀天下，这就是“民胞物与”的崇高境界！广厦建成！",
                wrong_feedback: "❌ 不对～这是杜甫最赤诚的心愿，为天下人甘愿牺牲自己！"
            }
        ];

        // 游戏状态变量
        let currentIndex = 0;
        let correctCount = 0;      // 答对题数 0-5
        let currentQuestionAnswered = false;
        let allCompleted = false;
        let isAnimating = false;

        // DOM 元素
        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const startBtn = document.getElementById('startGameBtn');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackText = document.getElementById('feedbackText');
        const feedbackIcon = document.getElementById('feedbackIcon');
        const resetBtn = document.getElementById('resetBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressTextEl = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const progressEmoji = document.getElementById('progressEmoji');
        const houseImage = document.getElementById('houseImage');

        // 开始游戏
        startBtn.addEventListener('click', function() {
            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            resetGame();
        });

        // 显示建造动画
        function showBuildingAnimation(partName, callback) {
            if (isAnimating) return;
            isAnimating = true;
            
            const toast = document.createElement('div');
            toast.className = 'building-toast';
            toast.innerHTML = `🏗️ ${partName} 搭建中... 🏗️`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
                
                const completeToast = document.createElement('div');
                completeToast.className = 'building-toast';
                completeToast.innerHTML = `✨ ${partName} 落成！ ✨`;
                document.body.appendChild(completeToast);
                
                setTimeout(() => {
                    completeToast.remove();
                    isAnimating = false;
                    if (callback) callback();
                }, 1000);
            }, 800);
        }

        // 更新进度和房子图片
        function updateProgress() {
            const percent = (correctCount / 5) * 100;
            progressFill.style.width = percent + '%';
            progressTextEl.innerText = `建造进度: ${correctCount}/5`;
            
            // 更新表情符号
            if (correctCount === 0) progressEmoji.innerText = '🪵';
            else if (correctCount === 1) progressEmoji.innerText = '🧱';
            else if (correctCount === 2) progressEmoji.innerText = '🚪';
            else if (correctCount === 3) progressEmoji.innerText = '🏠';
            else if (correctCount === 4) progressEmoji.innerText = '🏡';
            else if (correctCount === 5) progressEmoji.innerText = '✨🏆✨';
            
            // 切换房子图片（带淡入淡出效果）
            if (houseImage) {
                houseImage.style.opacity = '0';
                setTimeout(() => {
                    // 根据您的图片格式，如果是 .jpg 就改成 .jpg，如果是 .png 就改成 .png
                    houseImage.src = `house_${correctCount}.jpg`;
                    houseImage.style.opacity = '1';
                }, 200);
            }
        }

        // 加载题目
        function loadQuestion() {
            if (allCompleted) return;
            const q = questions[currentIndex];
            questionText.innerText = q.question;
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option-item';
                optDiv.innerText = opt;
                optDiv.addEventListener('click', (e) => handleOptionClick(e, q, idx));
                optionsContainer.appendChild(optDiv);
            });
            currentQuestionAnswered = false;
            feedbackText.innerText = '点击选项，为寒士添砖加瓦';
            feedbackIcon.innerText = '📖';
            document.querySelectorAll('.option-item').forEach(btn => {
                btn.classList.remove('disabled', 'correct', 'wrong');
            });
            
            // 更新下一题按钮状态
            if (nextBtn) {
                nextBtn.classList.remove('disabled');
                nextBtn.innerText = '⏩ 下一题';
            }
        }

        // 处理选项点击
        function handleOptionClick(e, q, selectedIdx) {
            if (currentQuestionAnswered || allCompleted || isAnimating) return;
            const target = e.currentTarget;
            const isCorrect = (selectedIdx === q.correct);
            const allOpts = document.querySelectorAll('.option-item');
            
            if (isCorrect) {
                target.classList.add('correct');
                feedbackText.innerText = q.correct_feedback;
                feedbackIcon.innerText = '✅';
                currentQuestionAnswered = true;
                allOpts.forEach(btn => btn.classList.add('disabled'));
                
                correctCount++;
                updateProgress();
                
                showBuildingAnimation(q.partName, () => {
                    if (correctCount === 5) {
                        allCompleted = true;
                        showCelebration();
                    }
                    // 注意：不在这里自动跳转，让用户点击"下一题"按钮
                });
            } else {
                target.classList.add('wrong');
                feedbackText.innerText = q.wrong_feedback;
                feedbackIcon.innerText = '❌';
                target.classList.add('disabled');
            }
        }

        // 下一题功能
        function goToNextQuestion() {
            if (allCompleted) return;
            
            if (!currentQuestionAnswered) {
                feedbackText.innerText = '⚠️ 请先答对当前题目，才能进入下一题！';
                feedbackIcon.innerText = '🧱';
                return;
            }
            
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                currentQuestionAnswered = false;
                loadQuestion();
                feedbackText.innerText = '📖 新题目来了！继续为寒士建造家园吧！';
                feedbackIcon.innerText = '📖';
            } else if (currentIndex === questions.length - 1 && correctCount === 5) {
                // 已经是最后一题且已答对，游戏已完成
                feedbackText.innerText = '🎉 恭喜！你已经完成了所有题目，广厦已经建成！';
                feedbackIcon.innerText = '🏆';
            } else {
                feedbackText.innerText = '📚 这是最后一题，答对即可建成广厦！';
                feedbackIcon.innerText = '🏠';
            }
        }

        // 显示通关庆祝页面
        function showCelebration() {
            const gameContainer = document.getElementById('gameScreen');
            const quizSection = document.querySelector('.quiz-section');
            const actionBtns = document.querySelector('.action-buttons');
            
            const celebrationDiv = document.createElement('div');
            celebrationDiv.className = 'celebration-page';
            celebrationDiv.innerHTML = `
                <div class="celebration-icon">🏆🎉🏡</div>
                <div class="celebration-title">恭喜你！广厦落成！</div>
                <div class="celebration-text">
                    你不仅吃透了《茅屋为秋风所破歌》的内容与情感，更读懂了杜甫由己及人、忧国忧民的诗圣情怀！
                </div>
                <button class="restart-btn" id="celebrationRestartBtn">🏗️ 再玩一局 🏗️</button>
            `;
            
            quizSection.style.display = 'none';
            actionBtns.style.display = 'none';
            gameContainer.appendChild(celebrationDiv);
            
            document.getElementById('celebrationRestartBtn').addEventListener('click', function() {
                celebrationDiv.remove();
                quizSection.style.display = 'block';
                actionBtns.style.display = 'flex';
                resetGame();
            });
        }

        // 重置游戏
        function resetGame() {
            currentIndex = 0;
            correctCount = 0;
            currentQuestionAnswered = false;
            allCompleted = false;
            isAnimating = false;
            
            updateProgress();
            loadQuestion();
            
            // 确保答题区和按钮重新显示
            const quizSection = document.querySelector('.quiz-section');
            const actionBtns = document.querySelector('.action-buttons');
            if (quizSection) quizSection.style.display = 'block';
            if (actionBtns) actionBtns.style.display = 'flex';
            
            // 移除庆祝页面（如果存在）
            const celebration = document.querySelector('.celebration-page');
            if (celebration) celebration.remove();
        }

        // 绑定事件
        resetBtn.addEventListener('click', resetGame);
        nextBtn.addEventListener('click', goToNextQuestion);
        
        // 初始化
        updateProgress();
    })();
</script>
</body>
</html>
